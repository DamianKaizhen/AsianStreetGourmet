<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Asian Street Gourmet favicon: the character 食 ("food/dish"),
       the last character of 亞洲街頭美食, in cream on the site's
       terracotta accent color. -->
  <rect width="32" height="32" fill="#A9441B"/>
  <text x="16" y="16.5"
        text-anchor="middle"
        dominant-baseline="central"
        font-family="'Noto Serif TC','Songti TC','PingFang TC','Microsoft YaHei','SimSun',serif"
        font-size="22"
        font-weight="700"
        fill="#F5F1EA">食</text>
</svg>
